<h2 style="color:#00205B; margin-top:0;">Archive</h2>

@if (loadError) {
  <div class="error-message">Failed to load archive summaries.</div>
} @else if (summaries.length === 0) {
  <div style="color:#aaa; padding:16px;">
    No archive directories found.
  </div>
}

<div style="display:flex; gap:16px; flex-wrap:wrap;">
  @for (s of summaries; track s.appId) {
    <mat-card style="min-width:200px; cursor:pointer;" (click)="viewJob(s.appId)">
      <mat-card-header>
        <mat-card-title style="color:#00205B;">{{ s.appId }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div style="font-size:13px; line-height:2;">
          <div><strong>{{ s.dayCount }}</strong> day(s)</div>
          <div><strong>{{ s.fileCount }}</strong> file(s)</div>
          @if (s.latestDay) {
            <div>Latest: <strong>{{ s.latestDay }}</strong></div>
          }
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary">Browse &rarr;</button>
      </mat-card-actions>
    </mat-card>
  }
</div>
